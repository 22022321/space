<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로켓 장애물 회피 게임 (Rocket Dodger)</title>
    <style>
        body {
            margin: 0;
            background-color: #0b0e14;
            color: #ffffff;
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
        }
        canvas {
            background: #05070a;
            border-radius: 8px;
            display: block;
        }
        #ui-panel {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 2px 2px 4px black;
        }
        #upgrade-menu {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            background: #161a24;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #2d3748;
        }
        button {
            background: #3182ce;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        button:hover { background: #2b6cb0; }
        button:disabled {
            background: #4a5568;
            cursor: not-allowed;
            opacity: 0.5;
        }
        #launch-btn {
            background: #e53e3e;
            padding: 10px 25px;
        }
        #launch-btn:hover { background: #c53030; }
        #controls-guide {
            margin-top: 8px;
            font-size: 13px;
            color: #a0aec0;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-panel">
            <div id="stats-left">
                보유 골드: <span id="gold-txt">0</span> G<br>
                최고 점수: <span id="highscore-txt">0</span> m
            </div>
            <div id="stats-right" style="text-align: right;">
                비행 거리: <span id="dist-txt">0</span> m<br>
                남은 연료: <span id="fuel-txt">100</span>%<br>
                보너스 속도: <span id="speed-txt">0</span>
            </div>
        </div>
        <canvas id="gameCanvas" width="450" height="600"></canvas>
    </div>

    <div id="upgrade-menu">
        <button id="up-engine-btn" onclick="upgrade('engine')">엔진 (좌우속도) Lv.<span id="lvl-engine">1</span><br><span id="cost-engine">100</span>G</button>
        <button id="up-fuel-btn" onclick="upgrade('fuel')">연료 (비행시간) Lv.<span id="lvl-fuel">1</span><br><span id="cost-fuel">120</span>G</button>
        <button id="up-booster-btn" onclick="upgrade('booster')">부스터 (위로대시) Lv.<span id="lvl-booster">1</span><br><span id="cost-booster">150</span>G</button>
        <button id="launch-btn" onclick="launchRocket()">🚀 발사!</button>
    </div>
    <div id="controls-guide">조작 방법: 키보드 방향키 [ ← ] [ → ] 좌우 이동 / [ ↑ ] 부스터 전진</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // --- 게임 상태 관리 ---
    let gameState = 'ready'; 
    let gold = 300; 
    let highScore = 0;
    let distance = 0;

    // --- 우주 배경 색상 정의 ---
    const spaceZones = [
        { distance: 0, colors: ['#05070a', '#131326'], stars: '#ffffff' },       // 0m ~ 250m
        { distance: 250, colors: ['#0f172a', '#1e3a8a'], stars: '#87ceeb' },     // 250m ~ 750m
        { distance: 750, colors: ['#1e1b4b', '#4c1d95'], stars: '#ff69b4' },     // 750m ~ 1500m
        { distance: 1500, colors: ['#3b0764', '#701a75'], stars: '#dda0dd' },    // 1500m ~ 3000m
        { distance: 3000, colors: ['#450a0a', '#991b1b'], stars: '#ff1493' },    // 3000m+
    ];

    let currentZone = 0;

    // --- 로켓 구조체 ---
    let rocket = {
        x: 225,
        y: 500,
        width: 24,
        height: 40,
        fuel: 100,
        maxFuel: 100
    };

    // --- 업그레이드 시스템 ---
    let upgrades = {
        engine: { level: 1, baseCost: 100, speed: 4 },
        fuel: { level: 1, baseCost: 120, maxFuel: 200 },
        booster: { level: 1, baseCost: 150, pushY: 8 }
    };

    // --- 장애물 관리 ---
    let obstacles = [];
    let spawnTimer = 0;
    let debrisTimer = 0; // 우주 쓰레기 생성 타이머
    let giantMeteorTimer = 0; 
    let giantWarningActive = false; 
    let giantWarningX = 0; 

    // --- 파티클(폭발 효과) 배열 ---
    let particles = [];

    let keys = { ArrowLeft: false, ArrowRight: false, ArrowUp: false };

    window.addEventListener('keydown', e => { if(e.key in keys) keys[e.key] = true; });
    window.addEventListener('keyup', e => { if(e.key in keys) keys[e.key] = false; });

    function updateSpaceZone() {
        let displayMeters = Math.floor(distance);
        for (let i = spaceZones.length - 1; i >= 0; i--) {
            if (displayMeters >= spaceZones[i].distance) {
                currentZone = i;
                break;
            }
        }
    }

    function update() {
        let displayMeters = Math.floor(distance);

        if (gameState === 'flying') {
            rocket.fuel -= 0.1;
            
            let speedBonus = keys.ArrowUp && rocket.fuel > 0 ? 2 : 1;
            distance += 0.15 * speedBonus; 

            updateSpaceZone();

            if (rocket.fuel <= 0) rocket.fuel = 0;

            let currentMoveSpeed = upgrades.engine.speed + (upgrades.engine.level - 1) * 0.8;
            if (keys.ArrowLeft && rocket.x > 0) rocket.x -= currentMoveSpeed;
            if (keys.ArrowRight && rocket.x < canvas.width - rocket.width) rocket.x += currentMoveSpeed;

            let boosterLimit = 450 - (upgrades.booster.level * 15);
            if (keys.ArrowUp && rocket.fuel > 0 && rocket.y > Math.max(100, boosterLimit)) {
                rocket.y -= 3;
                rocket.fuel -= 0.05;
            } else if (rocket.y < 500) {
                rocket.y += 2;
            }

            if (rocket.fuel <= 0 && rocket.y < 500) rocket.y += 3;

            // [기본 운석] 생성 루프
            spawnTimer++;
            let spawnInterval = Math.max(12, 50 - Math.floor(displayMeters * 0.02)); 
            if (spawnTimer > spawnInterval) {
                spawnObstacle();
                spawnTimer = 0;
            }

            // [신규: 우주 쓰레기 패턴] 400m 이상부터 좌우에서 빠르게 등장
            if (displayMeters > 400) {
                debrisTimer++;
                let debrisInterval = Math.max(40, 100 - Math.floor(displayMeters * 0.01));
                if (debrisTimer > debrisInterval) {
                    spawnSpaceDebris();
                    debrisTimer = 0;
                }
            }

            // [거대 운석] 생성 루프 (250m 이상 작동)
            if (displayMeters > 250) {
                giantMeteorTimer++;
                if (giantMeteorTimer === 450) {
                    giantWarningActive = true;
                    giantWarningX = Math.random() * (canvas.width - 150); 
                }
                if (giantMeteorTimer >= 540) { 
                    spawnGiantMeteor(giantWarningX);
                    giantMeteorTimer = 0;
                    giantWarningActive = false;
                }
            }

            // 장애물 이동 및 충돌 검사
            let difficultySpeedBonus = Math.min(8, displayMeters * 0.003);

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                
                if (obs.type === 'debris') {
                    // 우주 쓰레기는 가로로 이동
                    obs.x += obs.vx;
                    obs.y += obs.vy + difficultySpeedBonus * 0.3; // 미세하게 하강
                } else if (obs.type === 'giant') {
                    obs.y += obs.speed + (difficultySpeedBonus * 0.5); 
                } else if (obs.type === 'fast') {
                    obs.y += (obs.speed + 4) + difficultySpeedBonus;
                } else if (obs.type === 'sway') {
                    obs.y += obs.speed + difficultySpeedBonus;
                    obs.swayTimer = (obs.swayTimer || 0) + 1;
                    obs.x += Math.sin(obs.swayTimer * 0.12) * 2.5;
                    if (obs.x < 0) obs.x = 0;
                    if (obs.x + obs.size > canvas.width) obs.x = canvas.width - obs.size;
                } else {
                    obs.y += obs.speed + difficultySpeedBonus;
                }

                // 화면 밖으로 완전히 벗어나면 소멸 처리
                if (obs.y > canvas.height + obs.size || obs.x < -obs.size - 50 || obs.x > canvas.width + obs.size + 50) {
                    obstacles.splice(i, 1);
                    continue;
                }

                // 충돌 판정 계산
                let hitBuffer = obs.type === 'giant' ? 15 : 2; 
                if (rocket.x < obs.x + obs.size - hitBuffer &&
                    rocket.x + rocket.width > obs.x + hitBuffer &&
                    rocket.y < obs.y + obs.size - hitBuffer &&
                    rocket.y + rocket.height > obs.y + hitBuffer) {
                    triggerExplosion(rocket.x + rocket.width / 2, rocket.y + rocket.height / 2);
                }
            }
        }

        // [신규: 폭발 상태] 파티클 업데이트 로직
        if (gameState === 'exploding') {
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= p.decay;
                p.size *= 0.98; // 서서히 작아짐

                if (p.alpha <= 0 || p.size <= 0.5) {
                    particles.splice(i, 1);
                }
            }

            // 모든 파편이 사라지면 최종 점수 팝업창 호출 및 대기방 이동
            if (particles.length === 0) {
                endGame();
            }
        }

        render();
        requestAnimationFrame(update);
    }

    function spawnObstacle() {
        let size = Math.random() * 20 + 20;
        let obstacleType = 'normal';
        let displayMeters = Math.floor(distance);
        let difficultyChance = Math.min(0.7, displayMeters * 0.0003);
        
        if (Math.random() < difficultyChance) {
            let typeRoll = Math.random();
            if (typeRoll < 0.5) obstacleType = 'fast';
            else obstacleType = 'sway';
        }
        
        obstacles.push({
            x: Math.random() * (canvas.width - size),
            y: -size,
            size: size,
            speed: Math.random() * 2 + 3,
            type: obstacleType,
            swayTimer: 0
        });
    }

    // [신규] 우주 쓰레기 생성 함수 (가로 일직선 이동 파편)
    function spawnSpaceDebris() {
        let size = Math.random() * 12 + 10; // 기존 운석보다 다소 작고 날카로움 부각
        let fromLeft = Math.random() > 0.5;
        let startX = fromLeft ? -size : canvas.width;
        let startY = Math.random() * (canvas.height - 250) + 50; // 중상단 위주 스폰
        let speedX = (Math.random() * 3 + 4) * (fromLeft ? 1 : -1); // 매우 빠른 가로 속도

        obstacles.push({
            x: startX,
            y: startY,
            size: size,
            vx: speedX,
            vy: Math.random() * 1 - 0.5, // 위아래 미세 흔들림
            type: 'debris'
        });
    }

    function spawnGiantMeteor(targetX) {
        obstacles.push({
            x: targetX,
            y: -160,
            size: 150, 
            speed: 4.5,  
            type: 'giant',
            swayTimer: 0
        });
    }

    // [신규] 파티클 폭발 시작 연출 활성화 함수
    function triggerExplosion(ex, ey) {
        gameState = 'exploding';
        particles = [];

        // 불꽃 및 연기 파편 45개 생성
        for (let i = 0; i < 45; i++) {
            let angle = Math.random() * Math.PI * 2;
            let speed = Math.random() * 6 + 2;
            let colors = ['#ff3300', '#ff9900', '#ffff33', '#ffffff', '#7f7f7f'];
            
            particles.push({
                x: ex,
                y: ey,
                vx: Math.cos(angle) * speed,
                vy: Math.sin(angle) * speed,
                size: Math.random() * 6 + 4,
                color: colors[Math.floor(Math.random() * colors.length)],
                alpha: 1,
                decay: Math.random() * 0.015 + 0.01
            });
        }
    }

    // [신규] 폭발이 다 끝나고 결과를 처리하는 마무리 함수
    function endGame() {
        gameState = 'gameOver';
        let finalScore = Math.floor(distance);
        let earnedGold = Math.floor(finalScore * 0.8);
        gold += earnedGold;

        if (finalScore > highScore) highScore = finalScore;

        alert(`💥 쿠우웅! 로켓이 산산조각 났습니다!\n\n비행 기록: ${finalScore}m\n획득 골드: ${earnedGold}G`);
        
        gameState = 'ready';
        document.getElementById('launch-btn').disabled = false;
        toggleUpgradeButtons(true);
        updateUI();
    }

    function launchRocket() {
        if (gameState !== 'ready') return;
        gameState = 'flying';
        distance = 0;
        currentZone = 0;
        obstacles = [];
        particles = [];
        giantMeteorTimer = 0;
        debrisTimer = 0;
        giantWarningActive = false;
        rocket.x = canvas.width / 2 - rocket.width / 2;
        rocket.y = 500;
        rocket.maxFuel = upgrades.fuel.maxFuel + (upgrades.fuel.level - 1) * 50;
        rocket.fuel = rocket.maxFuel;
        document.getElementById('launch-btn').disabled = true;
        toggleUpgradeButtons(false);
    }

    function upgrade(type) {
        let cost = getCost(type);
        if (gold >= cost) {
            gold -= cost;
            upgrades[type].level++;
            updateUI();
        }
    }

    function getCost(type) {
        return Math.floor(upgrades[type].baseCost * Math.pow(1.4, upgrades[type].level - 1));
    }

    function updateUI() {
        document.getElementById('gold-txt').innerText = gold;
        document.getElementById('highscore-txt').innerText = highScore;
        ['engine', 'fuel', 'booster'].forEach(type => {
            document.getElementById(`lvl-${type}`).innerText = upgrades[type].level;
            document.getElementById(`cost-${type}`).innerText = getCost(type);
            document.getElementById(`up-${type}-btn`).disabled = (gold < getCost(type));
        });
    }

    function toggleUpgradeButtons(enabled) {
        ['engine', 'fuel', 'booster'].forEach(type => {
            document.getElementById(`up-${type}-btn`).disabled = !enabled || (gold < getCost(type));
        });
    }

    function render() {
        let zone = spaceZones[currentZone];

        let gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
        gradient.addColorStop(0, zone.colors[0]);
        gradient.addColorStop(1, zone.colors[1]);
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 별 흐르기 효과 (폭발 연출 중에는 흐름 일시 중지)
        ctx.fillStyle = zone.stars;
        let starSpeed = (gameState === 'flying' && keys.ArrowUp && rocket.fuel > 0) ? 8 : 3;
        if (gameState === 'exploding') starSpeed = 0;

        for (let i = 0; i < 25; i++) {
            let starY = (i * 45 + distance * (starSpeed * 10)) % canvas.height;
            let starX = (i * 87) % canvas.width;
            let starSize = 1 + Math.sin(i * 0.5) * 0.5;
            ctx.fillRect(starX, starY, starSize, starSize);
        }

        // 거대운석 경고선
        if (gameState === 'flying' && giantWarningActive) {
            ctx.strokeStyle = Math.floor(Date.now() / 100) % 2 === 0 ? 'rgba(255, 0, 0, 0.6)' : 'rgba(255, 0, 0, 0.1)';
            ctx.lineWidth = 4;
            ctx.strokeRect(giantWarningX, 0, 150, canvas.height);
            
            ctx.fillStyle = 'rgba(239, 68, 68, 0.8)';
            ctx.fillRect(giantWarningX + 15, 80, 120, 30);
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 12px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('⚠️ 거대운석 접근!', giantWarningX + 75, 100);
            ctx.textAlign = 'start'; 
        }

        // 장애물 그리기
        obstacles.forEach(obs => {
            if (obs.type === 'giant') {
                let gRad = ctx.createRadialGradient(obs.x + obs.size/2, obs.y + obs.size/2, 10, obs.x + obs.size/2, obs.y + obs.size/2, obs.size/2);
                gRad.addColorStop(0, '#ff4500');
                gRad.addColorStop(0.6, '#4a3728');
                gRad.addColorStop(1, '#1c1510');
                ctx.fillStyle = gRad;
                ctx.beginPath();
                ctx.arc(obs.x + obs.size/2, obs.y + obs.size/2, obs.size/2, 0, Math.PI * 2);
                ctx.fill();
            } else if (obs.type === 'debris') {
                // [신규] 우주 쓰레기는 사각형 파편 모양으로 날카롭게 묘사
                ctx.fillStyle = '#cbd5e1';
                ctx.save();
                ctx.translate(obs.x + obs.size/2, obs.y + obs.size/2);
                ctx.rotate(distance * 0.05); // 빙글빙글 회전 효과
                ctx.fillRect(-obs.size/2, -obs.size/2, obs.size, obs.size * 0.6);
                ctx.fillStyle = '#94a3b8';
                ctx.strokeRect(-obs.size/2, -obs.size/2, obs.size, obs.size * 0.6);
                ctx.restore();
            } else {
                if (obs.type === 'fast') ctx.fillStyle = '#fc8181';
                else if (obs.type === 'sway') ctx.fillStyle = '#fbd38d';
                else ctx.fillStyle = '#718096';
                
                ctx.beginPath();
                ctx.arc(obs.x + obs.size/2, obs.y + obs.size/2, obs.size/2, 0, Math.PI * 2);
                ctx.fill();
            }
        });

        // [신규] 폭발 파티클 렌더링
        if (gameState === 'exploding') {
            particles.forEach(p => {
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            });
        }

        // 로켓 및 불꽃 그리기 (생존 상태일 때만 출력)
        if (gameState === 'flying' || gameState === 'ready') {
            let rx = rocket.x;
            let ry = rocket.y;

            if (gameState === 'flying' && rocket.fuel > 0) {
                if (keys.ArrowUp) {
                    let flameHeight = 35 + Math.random() * 15;
                    let fGrad = ctx.createLinearGradient(rx, ry + rocket.height, rx, ry + rocket.height + flameHeight);
                    fGrad.addColorStop(0, '#ffffff');
                    fGrad.addColorStop(0.3, '#ff9800');
                    fGrad.addColorStop(1, 'rgba(244, 67, 54, 0)');
                    ctx.fillStyle = fGrad;
                    ctx.beginPath();
                    ctx.moveTo(rx - 2, ry + rocket.height);
                    ctx.lineTo(rx + rocket.width/2, ry + rocket.height + flameHeight);
                    ctx.lineTo(rx + rocket.width + 2, ry + rocket.height);
                    ctx.fill();
                } else {
                    ctx.fillStyle = Math.random() > 0.4 ? '#f6e05e' : '#ed8936';
                    ctx.beginPath();
                    ctx.moveTo(rx + 4, ry + rocket.height);
                    ctx.lineTo(rx + rocket.width/2, ry + rocket.height + 12 + Math.random()*8);
                    ctx.lineTo(rx + rocket.width - 4, ry + rocket.height);
                    ctx.fill();
                }
            }
            ctx.fillStyle = '#edf2f7';
            ctx.fillRect(rx, ry + 10, rocket.width, rocket.height - 10);
            ctx.fillStyle = '#e53e3e';
            ctx.beginPath();
            ctx.moveTo(rx, ry + 10); ctx.lineTo(rx + rocket.width/2, ry); ctx.lineTo(rx + rocket.width, ry + 10);
            ctx.fill();
            ctx.fillStyle = '#4a5568';
            ctx.fillRect(rx - 6, ry + rocket.height - 15, 6, 15);
            ctx.fillRect(rx + rocket.width, ry + rocket.height - 15, 6, 15);
        }

        let fuelPercent = Math.max(0, Math.ceil((rocket.fuel / rocket.maxFuel) * 100));
        document.getElementById('dist-txt').innerText = Math.floor(distance);
        document.getElementById('fuel-txt').innerText = fuelPercent;
        document.getElementById('speed-txt').innerText = keys.ArrowUp && rocket.fuel > 0 ? "2X (부스터 가속!)" : "1X (기본)";
    }

    updateUI();
    update();
</script>
</body>
</html>
