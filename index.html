<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로켓 장애물 회피 게임 (Rocket Dodger)</title>
    <style>
        body {
            margin: 0;
            background-color: #0b0e14;
            color: #ffffff;
            font-family: 'Malgun Gothic', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #game-container {
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.6);
        }
        canvas {
            background: #05070a;
            border-radius: 8px;
            display: block;
        }
        #ui-panel {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 2px 2px 4px black;
        }
        #upgrade-menu {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            background: #161a24;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #2d3748;
        }
        button {
            background: #3182ce;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        button:hover { background: #2b6cb0; }
        button:disabled {
            background: #4a5568;
            cursor: not-allowed;
            opacity: 0.5;
        }
        #launch-btn {
            background: #e53e3e;
            padding: 10px 25px;
        }
        #launch-btn:hover { background: #c53030; }
        #controls-guide {
            margin-top: 8px;
            font-size: 13px;
            color: #a0aec0;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="ui-panel">
            <div id="stats-left">
                보유 골드: <span id="gold-txt">0</span> G<br>
                최고 점수: <span id="highscore-txt">0</span> m
            </div>
            <div id="stats-right" style="text-align: right;">
                비행 거리: <span id="dist-txt">0</span> m<br>
                남은 연료: <span id="fuel-txt">100</span>%<br>
                보너스 속도: <span id="speed-txt">0</span>
            </div>
        </div>
        <canvas id="gameCanvas" width="450" height="600"></canvas>
    </div>

    <div id="upgrade-menu">
        <button id="up-engine-btn" onclick="upgrade('engine')">엔진 (좌우속도) Lv.<span id="lvl-engine">1</span><br><span id="cost-engine">100</span>G</button>
        <button id="up-fuel-btn" onclick="upgrade('fuel')">연료 (비행시간) Lv.<span id="lvl-fuel">1</span><br><span id="cost-fuel">120</span>G</button>
        <button id="up-booster-btn" onclick="upgrade('booster')">부스터 (위로대시) Lv.<span id="lvl-booster">1</span><br><span id="cost-booster">150</span>G</button>
        <button id="launch-btn" onclick="launchRocket()">🚀 발사!</button>
    </div>
    <div id="controls-guide">조작 방법: 키보드 방향키 [ ← ] [ → ] 좌우 이동 / [ ↑ ] 부스터 전진</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // --- 게임 상태 관리 ---
    let gameState = 'ready'; // ready, flying, gameOver
    let gold = 300; 
    let highScore = 0;
    let distance = 0;

    // --- 우주 배경 색상 정의 (거리별 그라데이션) ---
    const spaceZones = [
        { distance: 0, colors: ['#05070a', '#1a1a2e', '#16213e'], stars: '#ffffff' },          // 깊은 파란색 (0~500m)
        { distance: 250, colors: ['#16213e', '#0f3460', '#16213e'], stars: '#87ceeb' },       // 진한 파란색 (500~1500m)
        { distance: 750, colors: ['#0f3460', '#2e1a47', '#4a0e4e'], stars: '#ff69b4' },     // 보라색 (1500~2500m)
        { distance: 1500, colors: ['#2e1a47', '#4a0e4e', '#5a1a6f'], stars: '#dda0dd' },     // 자주색 (2500~4000m)
        { distance: 3000, colors: ['#4a0e4e', '#6b1b6f', '#8b0000'], stars: '#ff1493' },     // 진분홍 (4000~5500m)
        { distance: 4500, colors: ['#6b1b6f', '#8b0000', '#ff4500'], stars: '#ffa500' },     // 주황색 (5500~7000m)
        { distance: 6500, colors: ['#8b0000', '#ff4500', '#ffd700'], stars: '#ffff00' },     // 노란색 (7000m+)
    ];

    // 현재 우주 배경 상태
    let currentZone = 0;
    let zoneProgress = 0; // 0~1 사이의 값 (다음 존으로의 진행도)

    // --- 로켓 구조체 ---
    let rocket = {
        x: 225,
        y: 500,
        width: 24,
        height: 40,
        fuel: 100,
        maxFuel: 100,
        targetY: 500
    };

    // --- 업그레이드 시스템 ---
    let upgrades = {
        engine: { level: 1, baseCost: 100, speed: 4 },
        fuel: { level: 1, baseCost: 120, maxFuel: 200 },
        booster: { level: 1, baseCost: 150, pushY: 8 }
    };

    // --- 장애물(운석) 관리 ---
    let obstacles = [];
    let spawnTimer = 0;

    // --- 조작키 상태 ---
    let keys = { ArrowLeft: false, ArrowRight: false, ArrowUp: false };

    window.addEventListener('keydown', e => { if(e.key in keys) keys[e.key] = true; });
    window.addEventListener('keyup', e => { if(e.key in keys) keys[e.key] = false; });

    // --- 우주 존 업데이트 함수 ---
    function updateSpaceZone() {
        // 거리에 따라 현재 존 결정
        for (let i = spaceZones.length - 1; i >= 0; i--) {
            if (distance >= spaceZones[i].distance) {
                if (i < spaceZones.length - 1) {
                    // 다음 존으로의 진행도 계산
                    let nextZoneDistance = spaceZones[i + 1].distance;
                    zoneProgress = (distance - spaceZones[i].distance) / (nextZoneDistance - spaceZones[i].distance);
                    zoneProgress = Math.min(1, Math.max(0, zoneProgress)); // 0~1 범위로 제한
                    currentZone = i;
                } else {
                    zoneProgress = 1;
                    currentZone = i;
                }
                break;
            }
        }
    }

    // --- 배경 그라데이션 색상 계산 함수 ---
    function interpolateColor(color1, color2, factor) {
        const c1 = parseInt(color1.slice(1), 16);
        const c2 = parseInt(color2.slice(1), 16);
        
        const r1 = (c1 >> 16) & 255;
        const g1 = (c1 >> 8) & 255;
        const b1 = c1 & 255;
        
        const r2 = (c2 >> 16) & 255;
        const g2 = (c2 >> 8) & 255;
        const b2 = c2 & 255;
        
        const r = Math.round(r1 + (r2 - r1) * factor);
        const g = Math.round(g1 + (g2 - g1) * factor);
        const b = Math.round(b1 + (b2 - b1) * factor);
        
        return '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');
    }

    // --- 현재 배경 색상 반환 함수 ---
    function getCurrentBackgroundColor() {
        const zone = spaceZones[currentZone];
        if (currentZone < spaceZones.length - 1) {
            const nextZone = spaceZones[currentZone + 1];
            // 두 존 사이에서 보간
            const color1 = interpolateColor(zone.colors[0], zone.colors[1], 0.5);
            const color2 = interpolateColor(nextZone.colors[0], nextZone.colors[1], 0.5);
            return interpolateColor(color1, color2, zoneProgress);
        }
        return zone.colors[0];
    }

    // --- 게임 루프 ---
    function update() {
        if (gameState === 'flying') {
            // 1. 연료 감소 및 거리 증가
            rocket.fuel -= 0.1;
            
            let speedBonus = keys.ArrowUp && rocket.fuel > 0 ? 2 : 1;
            distance += 0.2 * speedBonus;

            // 우주 존 업데이트
            updateSpaceZone();

            if (rocket.fuel <= 0) {
                rocket.fuel = 0;
            }

            // 2. 로켓 조작 (좌우 이동)
            let currentMoveSpeed = upgrades.engine.speed + (upgrades.engine.level - 1) * 0.8;
            if (keys.ArrowLeft && rocket.x > 0) {
                rocket.x -= currentMoveSpeed;
            }
            if (keys.ArrowRight && rocket.x < canvas.width - rocket.width) {
                rocket.x += currentMoveSpeed;
            }

            // 3. 로켓 조작 (위로 이동 - 부스터)
            let boosterLimit = 450 - (upgrades.booster.level * 15);
            if (keys.ArrowUp && rocket.fuel > 0 && rocket.y > Math.max(100, boosterLimit)) {
                rocket.y -= 3;
                rocket.fuel -= 0.05;
            } else if (rocket.y < 500) {
                rocket.y += 2;
            }

            if (rocket.fuel <= 0 && rocket.y < 500) {
                rocket.y += 3;
            }

            // 4. 장애물 생성
            spawnTimer++;
            let spawnInterval = Math.max(20, 60 - Math.floor(distance * 0.05));
            if (spawnTimer > spawnInterval) {
                spawnObstacle();
                spawnTimer = 0;
            }

            // 5. 장애물 업데이트 및 충돌 체크
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                
                // 장애물 타입별 움직임
                if (obs.type === 'fast') {
                    obs.y += (obs.speed + 3) + Math.min(5, distance * 0.01);
                } else if (obs.type === 'sway') {
                    obs.y += obs.speed + Math.min(5, distance * 0.01);
                    obs.swayTimer = (obs.swayTimer || 0) + 1;
                    obs.x += Math.sin(obs.swayTimer * 0.1) * 2;
                    
                    if (obs.x < 0) obs.x = 0;
                    if (obs.x + obs.size > canvas.width) obs.x = canvas.width - obs.size;
                } else {
                    obs.y += obs.speed + Math.min(5, distance * 0.01);
                }

                if (obs.y > canvas.height) {
                    obstacles.splice(i, 1);
                    continue;
                }

                // 충돌 체크
                if (rocket.x < obs.x + obs.size &&
                    rocket.x + rocket.width > obs.x &&
                    rocket.y < obs.y + obs.size &&
                    rocket.y + rocket.height > obs.y) {
                    explodeRocket();
                }
            }
        }

        render();
        requestAnimationFrame(update);
    }

    // --- 장애물 생성 함수 ---
    function spawnObstacle() {
        let size = Math.random() * 20 + 20;
        
        let obstacleType = 'normal';
        let difficultyChance = Math.min(0.6, distance * 0.001);
        
        if (Math.random() < difficultyChance) {
            let typeRoll = Math.random();
            if (typeRoll < 0.5) {
                obstacleType = 'fast';
            } else {
                obstacleType = 'sway';
            }
        }
        
        obstacles.push({
            x: Math.random() * (canvas.width - size),
            y: -size,
            size: size,
            speed: Math.random() * 2 + 3,
            type: obstacleType,
            swayTimer: 0
        });
    }

    // --- 발사 버튼 ---
    function launchRocket() {
        if (gameState !== 'ready') return;

        gameState = 'flying';
        distance = 0;
        currentZone = 0;
        zoneProgress = 0;
        obstacles = [];
        rocket.x = canvas.width / 2 - rocket.width / 2;
        rocket.y = 500;
        rocket.maxFuel = upgrades.fuel.maxFuel + (upgrades.fuel.level - 1) * 50;
        rocket.fuel = rocket.maxFuel;

        document.getElementById('launch-btn').disabled = true;
        toggleUpgradeButtons(false);
    }

    // --- 충돌 및 사망 처리 ---
    function explodeRocket() {
        gameState = 'gameOver';
        
        let finalScore = Math.floor(distance);
        let earnedGold = Math.floor(finalScore * 0.8);
        gold += earnedGold;

        if (finalScore > highScore) {
            highScore = finalScore;
        }

        setTimeout(() => {
            alert(`💥 쿠우웅! 장애물과 충돌했습니다!\n\n비행 기록: ${finalScore}m\n획득 골드: ${earnedGold}G`);
            gameState = 'ready';
            document.getElementById('launch-btn').disabled = false;
            toggleUpgradeButtons(true);
            updateUI();
        }, 10);
    }

    // --- 업그레이드 로직 ---
    function upgrade(type) {
        let cost = getCost(type);
        if (gold >= cost) {
            gold -= cost;
            upgrades[type].level++;
            updateUI();
        }
    }

    function getCost(type) {
        return Math.floor(upgrades[type].baseCost * Math.pow(1.4, upgrades[type].level - 1));
    }

    // --- UI 동기화 ---
    function updateUI() {
        document.getElementById('gold-txt').innerText = gold;
        document.getElementById('highscore-txt').innerText = highScore;
        
        ['engine', 'fuel', 'booster'].forEach(type => {
            document.getElementById(`lvl-${type}`).innerText = upgrades[type].level;
            document.getElementById(`cost-${type}`).innerText = getCost(type);
            document.getElementById(`up-${type}-btn`).disabled = (gold < getCost(type));
        });
    }

    function toggleUpgradeButtons(enabled) {
        ['engine', 'fuel', 'booster'].forEach(type => {
            document.getElementById(`up-${type}-btn`).disabled = !enabled || (gold < getCost(type));
        });
    }

    // --- 그래픽 렌더링 ---
    function render() {
        // 현재 배경 색상 적용
        let bgColor = getCurrentBackgroundColor();
        ctx.fillStyle = bgColor;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 동적 그라데이션 배경 추가 (깊이감)
        let gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
        let zone = spaceZones[currentZone];
        gradient.addColorStop(0, zone.colors[0]);
        gradient.addColorStop(0.5, zone.colors[1]);
        gradient.addColorStop(1, zone.colors[2]);
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 1. 별 연출 (색상도 동적 변경)
        ctx.fillStyle = zone.stars;
        let starSpeed = keys.ArrowUp && rocket.fuel > 0 ? 8 : 3;
        for (let i = 0; i < 25; i++) {
            let starY = (i * 45 + distance * (starSpeed * 2)) % canvas.height;
            let starX = (i * 87) % canvas.width;
            let starSize = 1 + Math.sin(i * 0.5) * 0.5; // 별이 반짝이는 효과
            ctx.fillRect(starX, starY, starSize, starSize);
        }

        // 2. 장애물 그리기
        obstacles.forEach(obs => {
            if (obs.type === 'fast') {
                ctx.fillStyle = '#fc8181';
            } else if (obs.type === 'sway') {
                ctx.fillStyle = '#fbd38d';
            } else {
                ctx.fillStyle = '#718096';
            }
            
            ctx.beginPath();
            ctx.arc(obs.x + obs.size/2, obs.y + obs.size/2, obs.size/2, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#4a5568';
            ctx.beginPath();
            ctx.arc(obs.x + obs.size*0.3, obs.y + obs.size*0.4, obs.size*0.15, 0, Math.PI * 2);
            ctx.fill();
        });

        // 3. 로켓 그리기
        if (gameState !== 'gameOver') {
            let rx = rocket.x;
            let ry = rocket.y;

            if (gameState === 'flying' && rocket.fuel > 0) {
                ctx.fillStyle = Math.random() > 0.4 ? '#f6e05e' : '#ed8936';
                ctx.beginPath();
                ctx.moveTo(rx + 4, ry + rocket.height);
                ctx.lineTo(rx + rocket.width/2, ry + rocket.height + (keys.ArrowUp ? 25 : 12) + Math.random()*8);
                ctx.lineTo(rx + rocket.width - 4, ry + rocket.height);
                ctx.fill();
            }

            ctx.fillStyle = '#edf2f7';
            ctx.fillRect(rx, ry + 10, rocket.width, rocket.height - 10);

            ctx.fillStyle = '#e53e3e';
            ctx.beginPath();
            ctx.moveTo(rx, ry + 10);
            ctx.lineTo(rx + rocket.width/2, ry);
            ctx.lineTo(rx + rocket.width, ry + 10);
            ctx.fill();

            ctx.fillStyle = '#4a5568';
            ctx.fillRect(rx - 6, ry + rocket.height - 15, 6, 15);
            ctx.fillRect(rx + rocket.width, ry + rocket.height - 15, 6, 15);
        }

        let fuelPercent = Math.max(0, Math.ceil((rocket.fuel / rocket.maxFuel) * 100));
        document.getElementById('dist-txt').innerText = Math.floor(distance);
        document.getElementById('fuel-txt').innerText = fuelPercent;
        document.getElementById('speed-txt').innerText = keys.ArrowUp && rocket.fuel > 0 ? "2X (부스터 가속!)" : "1X (기본)";
    }

    updateUI();
    update();
</script>
</body>
</html>
